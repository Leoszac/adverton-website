---
deployment:
  tasks:
    - export DEPLOYPATH=/home/advertonnet/public_html
    - /bin/rm -f $DEPLOYPATH/index.php $DEPLOYPATH/index.htm
    - /bin/rm -rf $DEPLOYPATH/sp-content $DEPLOYPATH/sp-data $DEPLOYPATH/sp-includes $DEPLOYPATH/sp-admin
    - /bin/rm -f $DEPLOYPATH/audit-config.example.php
    - /bin/sh -c "/bin/cp -Rf *.html *.php *.css *.svg *.ico *.png sitemap.xml robots.txt .htaccess $DEPLOYPATH/"
    - /bin/cp -Rf assets $DEPLOYPATH/
    - /bin/cp -Rf lib $DEPLOYPATH/
    - /bin/cp -Rf legal $DEPLOYPATH/
    - /bin/cp -Rf crm $DEPLOYPATH/
    # email-pipe.php is invoked by cPanel mail forwarder via shebang;
    # needs +x so the kernel will exec it.
    - /bin/chmod 755 $DEPLOYPATH/crm/email-pipe.php
    - /bin/rm -f $DEPLOYPATH/audit-config.example.php
    - /bin/rm -f $DEPLOYPATH/crm-config.example.php
    - /bin/rm -f $DEPLOYPATH/crm/run-migration-v9.php
    - /bin/rm -f $DEPLOYPATH/crm/seed-nurture-sequences.php
    - /bin/rm -f $DEPLOYPATH/crm/patch-nurture-tail-task.php
    - /bin/rm -f $DEPLOYPATH/crm/_cleanup-files.php
    - /bin/rm -f $DEPLOYPATH/crm/setup-cron.php
    # Belt-and-suspenders rm of one-shot scripts that already ran successfully.
    # Files no longer in repo; these guard against accidental server-side leftovers.
    - /bin/rm -f $DEPLOYPATH/crm/_run-v10.php
    - /bin/rm -f $DEPLOYPATH/crm/_run-v11.php
    - /bin/rm -f $DEPLOYPATH/crm/_run-v12.php
    # _run-v13.php (cold-calling pipeline schema) — self-destructs on success;
    # this rm guards against accidental leftovers if the run failed mid-way.
    # Comment out the line below until the first run; uncomment after.
    # - /bin/rm -f $DEPLOYPATH/crm/_run-v13.php
    - /bin/rm -f $DEPLOYPATH/crm/_fix-cron.php
    - /bin/rm -f $DEPLOYPATH/crm/_diag-cron.php
    # _install-cron.php (CRON_TZ variant) self-destructs after success;
    # uncomment after first user-triggered run.
    # - /bin/rm -f $DEPLOYPATH/crm/_install-cron.php
    - /bin/rm -f $DEPLOYPATH/crm/_bootstrap-v11.php
    - /bin/rm -f $DEPLOYPATH/crm/_fix-sign-cols.php
    - /bin/rm -f $DEPLOYPATH/crm/seed-users.php
    - /bin/rm -f $DEPLOYPATH/crm/import-audit-log.php
    # Dormant integrations replaced (PandaDoc/Smartlead → Stripe/Instantly; OpenSign → click-wrap).
    - /bin/rm -f $DEPLOYPATH/crm/pandadoc-webhook.php
    - /bin/rm -f $DEPLOYPATH/crm/smartlead-webhook.php
    - /bin/rm -f $DEPLOYPATH/crm/opensign-webhook.php
    - /bin/rm -f $DEPLOYPATH/crm/lib/opensign.php
