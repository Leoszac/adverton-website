name: Deploy to adverton.net

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-adverton-net
  cancel-in-progress: false

jobs:
  deploy:
    name: SFTP mirror to public_html
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install lftp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if ! head -1 ~/.ssh/id_deploy | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "ERROR: SSH_PRIVATE_KEY secret doesn't look like a private key" >&2
            exit 1
          fi

      - name: Mirror site to public_html via SFTP
        env:
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_PATH: /home2/advertonnet/public_html
        run: |
          echo "→ Mirroring to ${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}"

          # Build lftp script — every command on its own line, no backslash
          # continuations (those don't work inside a heredoc).
          cat > /tmp/lftp.cmds <<LFTP
          set cmd:fail-exit yes
          set cmd:verbose yes
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 30
          set net:reconnect-interval-base 5
          set xfer:clobber yes
          set sftp:connect-program "ssh -a -x -i /home/runner/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o BatchMode=yes -o ConnectTimeout=15"
          mirror --reverse --only-newer --verbose --parallel=2 --exclude-glob .git --exclude-glob .git/ --exclude-glob .github --exclude-glob .github/ --exclude-glob .gitignore --exclude-glob .cpanel.yml --exclude-glob audit-config.example.php --exclude-glob crm-config.example.php --exclude-glob DEPLOY_GUIDE.md --exclude-glob configure_forms.sh --exclude-glob .DS_Store ./ ${REMOTE_PATH}/
          bye
          LFTP

          echo "----- lftp script -----"
          cat /tmp/lftp.cmds
          echo "----- running -----"

          lftp -u "${SSH_USER}," "sftp://${SSH_HOST}:${SSH_PORT}" < /tmp/lftp.cmds
          echo "✓ Mirror complete"

      - name: Verify live site
        env:
          SITE_URL: https://adverton.net/
        run: |
          # Site is static; new files should be served immediately after upload.
          for i in 1 2 3; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$SITE_URL")
            echo "Attempt $i: HTTP $CODE"
            [ "$CODE" = "200" ] && exit 0
            sleep 3
          done
          echo "Site did not return 200 after deploy" >&2
          exit 1
