name: Deploy to adverton.net

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

concurrency:
  group: deploy-adverton-net
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull + deploy on cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Sanity check: the file should look like a private key
          if ! head -1 ~/.ssh/id_deploy | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "ERROR: SSH_PRIVATE_KEY secret doesn't look like a private key"
            head -1 ~/.ssh/id_deploy
            exit 1
          fi
          echo "Key looks well-formed."

      - name: Pull from GitHub + deploy via cPanel UAPI
        env:
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REPO_ROOT: /home2/advertonnet/repositories/adverton-website
        run: |
          echo "Connecting to ${SSH_USER}@${SSH_HOST}:${SSH_PORT}..."
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              -o ServerAliveInterval=5 \
              "${SSH_USER}@${SSH_HOST}" \
              "set -e; \
               echo '→ Pulling main from GitHub'; \
               uapi --output=json VersionControl update repository_root=${REPO_ROOT} branch=main; \
               echo '→ Running .cpanel.yml deploy'; \
               uapi --output=json VersionControlDeployment create repository_root=${REPO_ROOT}; \
               echo '✓ Triggered'"

      - name: Verify live site
        env:
          SITE_URL: https://adverton.net/
        run: |
          # cPanel deploy task runs async — give it a moment
          sleep 12
          for i in 1 2 3; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$SITE_URL")
            echo "Attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 4
          done
          echo "Site did not return 200 after deploy"
          exit 1
